spring.application.name=studsluzba-server
server.port=${SERVER_PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=STUDENT_SERVICE_SESSION

grading.exam.max-points=${GRADING_EXAM_MAX_POINTS:70}
grading.predispit.max-total-points=${GRADING_PREDISPIT_MAX_TOTAL_POINTS:30}
tuition.default.eur=${TUITION_DEFAULT_EUR:3000.00}
payment.exchange-rate.fallback-eur-rsd=${PAYMENT_EXCHANGE_RATE_FALLBACK_EUR_RSD:117.00}
payment.exchange-rate.api-url=${PAYMENT_EXCHANGE_RATE_API_URL:https://kurs.resenje.org/api/v1/currencies/eur/rates/today}
enrollment.regular.minimum-ects-per-year=${ENROLLMENT_REGULAR_MINIMUM_ECTS_PER_YEAR:48}
enrollment.conditional.minimum-ects-per-year=${ENROLLMENT_CONDITIONAL_MINIMUM_ECTS_PER_YEAR:37}
enrollment.transfer.max-ects=${ENROLLMENT_TRANSFER_MAX_ECTS:60}

app.cookie.same-site=${COOKIE_SAME_SITE:Lax}
app.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
