spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/studentski_servis?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
finance.exam-registration.max-debt-eur=${FINANCE_EXAM_REGISTRATION_MAX_DEBT_EUR:0.00}
app.seed.demo-data.enabled=${DEMO_DATA_ENABLED:false}
