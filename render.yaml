services:
  - type: web
    name: backend
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./ServerAndDTOs/Dockerfile
    dockerContext: ./ServerAndDTOs
    healthCheckPath: /api/auth/csrf
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev
      - key: DEMO_DATA_ENABLED
        value: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_USERNAME
        value: admin@demo.edu
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false

  - type: web
    name: student-service-web
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./web-client/Dockerfile
    dockerContext: ./web-client
    envVars:
      - key: BACKEND_PROXY_URL
        sync: false
      - key: BACKEND_HOST
        sync: false
